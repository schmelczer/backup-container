name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install ShellCheck
        run: apt-get update && apt-get install -y shellcheck

      - name: Run ShellCheck
        run: find ./src -name '*.sh' -exec shellcheck {} +
